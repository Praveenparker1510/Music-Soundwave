<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Music — SoundWave</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.browse-layout {
  display: flex;
  padding-top: var(--nav-h);
  min-height: 100vh;
}
/* SIDEBAR */
.browse-sidebar {
  width: 230px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 0;
  position: sticky;
  top: var(--nav-h);
  height: calc(100vh - var(--nav-h));
  overflow-y: auto;
}
.bs-title {
  font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); padding: 0 20px 12px; font-weight: 600;
}
.bs-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 20px; width: 100%;
  background: none; border: none; color: var(--muted);
  font-family: 'Outfit', sans-serif; font-size: 0.88rem;
  cursor: pointer; text-align: left; transition: all 0.18s;
  border-left: 3px solid transparent;
}
.bs-btn:hover { color: var(--text); background: var(--card); }
.bs-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(255,107,53,0.07); font-weight: 600; }
.bs-left { display: flex; align-items: center; gap: 10px; }
.bs-count { font-size: 0.72rem; background: var(--card); padding: 2px 8px; border-radius: 10px; }
.bs-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.fav-badge { background: var(--accent); color: white; font-size: 0.7rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; }

/* BROWSE MAIN */
.browse-main { flex: 1; padding: 32px 40px 120px; }
.browse-topbar {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 28px; flex-wrap: wrap;
}
.search-field {
  flex: 1; min-width: 220px;
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 50px; padding: 10px 18px;
  transition: border-color 0.2s;
}
.search-field:focus-within { border-color: var(--accent); }
.search-field input {
  background: none; border: none; outline: none;
  color: var(--text); font-size: 0.9rem; width: 100%;
  font-family: 'Outfit', sans-serif;
}
.search-field input::placeholder { color: var(--muted); }
.sort-select {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 10px;
  font-family: 'Outfit', sans-serif; font-size: 0.85rem;
  cursor: pointer; outline: none;
}
.results-label { color: var(--muted); font-size: 0.82rem; margin-bottom: 16px; }

/* SONG GRID */
.s-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.s-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; cursor: pointer;
  transition: all 0.22s; position: relative;
}
.s-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(255,107,53,0.12); }
.s-card.playing { border-color: var(--accent); background: rgba(255,107,53,0.06); }
.s-art {
  aspect-ratio: 1; border-radius: 10px;
  background: var(--surface); display: flex;
  align-items: center; justify-content: center;
  font-size: 2.6rem; margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.s-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s; border-radius: 10px;
}
.s-card:hover .s-overlay { opacity: 1; }
.s-play-btn {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--accent); border: none; color: white;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.s-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.s-artist { color: var(--muted); font-size: 0.78rem; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-foot { display: flex; align-items: center; justify-content: space-between; }
.s-genre-tag {
  font-size: 0.69rem; padding: 2px 9px; border-radius: 20px;
  background: rgba(255,107,53,0.1); color: var(--accent); border: 1px solid rgba(255,107,53,0.2);
}
.s-actions { display: flex; gap: 4px; }
.s-act-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.95rem; padding: 3px;
  transition: color 0.18s;
}
.s-act-btn:hover { color: var(--accent); }
.s-act-btn.fav-on { color: var(--accent); }

/* PLAYING BARS */
.play-bars {
  display: flex; gap: 2px; align-items: flex-end; height: 14px;
  position: absolute; top: 10px; right: 10px;
}
.play-bars span {
  width: 3px; background: var(--accent); border-radius: 2px;
  animation: barAnim 0.8s ease infinite;
}
.play-bars span:nth-child(2) { animation-delay: 0.15s; }
.play-bars span:nth-child(3) { animation-delay: 0.3s; }
@keyframes barAnim { 0%,100%{height:4px} 50%{height:12px} }

/* PAGINATION */
.pagination {
  display: flex; justify-content: center; gap: 8px; margin-top: 40px;
}
.pg-btn {
  padding: 8px 14px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 0.85rem;
  transition: all 0.18s; font-family: 'Outfit', sans-serif;
}
.pg-btn:hover, .pg-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.empty-state { text-align: center; padding: 80px 40px; color: var(--muted); }
.empty-state .big { font-size: 3.5rem; margin-bottom: 16px; }
.empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }

@media (max-width: 800px) {
  .browse-sidebar { display: none; }
  .browse-main { padding: 24px 20px 120px; }
  .s-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Sound<span>Wave</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link active">Browse</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="contact.html" class="nav-link">Contact</a>
  </div>
  <a href="browse.html" class="nav-cta">Explore Music →</a>
  <div class="auth-btns">
    <a href="#" class="btn-premium" onclick="event.preventDefault(); openPremiumModal()">💎 Premium</a>
    <a href="#" class="btn-login" onclick="event.preventDefault(); openAuthModal('login')">Log In</a>
    <a href="#" class="btn-signup" onclick="event.preventDefault(); openAuthModal('signup')">Sign Up</a>
  </div>
  <button class="nav-burger" onclick="toggleMenu()">☰</button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html" onclick="toggleMenu()">Home</a>
  <a href="browse.html" onclick="toggleMenu()">Browse</a>
  <a href="about.html" onclick="toggleMenu()">About</a>
  <a href="contact.html" onclick="toggleMenu()">Contact</a>
  <hr style="border:none;border-top:1px solid var(--border);margin:10px 0;">
  <div style="display:flex;padding:5px 12px;margin-bottom:10px">
    <a href="#" class="btn-premium" style="flex:1;text-align:center;justify-content:center" onclick="event.preventDefault(); openPremiumModal()">💎 Premium</a>
  </div>
  <div style="display:flex;gap:10px;padding:5px 12px">
    <a href="#" class="btn-login" style="flex:1;text-align:center" onclick="event.preventDefault(); openAuthModal('login')">Log In</a>
    <a href="#" class="btn-signup" style="flex:1;text-align:center" onclick="event.preventDefault(); openAuthModal('signup')">Sign Up</a>
  </div>
</div>

<div class="browse-layout">
  <!-- SIDEBAR -->
  <aside class="browse-sidebar">
    <div class="bs-title">Genres</div>
    <button class="bs-btn active" onclick="setFilter('all',this)">
      <span class="bs-left">🎵 All Songs</span>
      <span class="bs-count" id="cnt-all">210</span>
    </button>
    <button class="bs-btn" onclick="setFilter('Electronic',this)">
      <span class="bs-left">🎛️ Electronic</span>
      <span class="bs-count" id="cnt-Electronic"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Rock',this)">
      <span class="bs-left">🎸 Rock</span>
      <span class="bs-count" id="cnt-Rock"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Jazz',this)">
      <span class="bs-left">🎷 Jazz</span>
      <span class="bs-count" id="cnt-Jazz"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Classical',this)">
      <span class="bs-left">🎻 Classical</span>
      <span class="bs-count" id="cnt-Classical"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Hip-Hop',this)">
      <span class="bs-left">🎤 Hip-Hop</span>
      <span class="bs-count" id="cnt-Hip-Hop"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Ambient',this)">
      <span class="bs-left">🌌 Ambient</span>
      <span class="bs-count" id="cnt-Ambient"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Folk',this)">
      <span class="bs-left">🪕 Folk</span>
      <span class="bs-count" id="cnt-Folk"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Pop',this)">
      <span class="bs-left">✨ Pop</span>
      <span class="bs-count" id="cnt-Pop"></span>
    </button>
    <button class="bs-btn" onclick="setFilter('Instrumental',this)">
      <span class="bs-left">🎹 Instrumental</span>
      <span class="bs-count" id="cnt-Instrumental"></span>
    </button>
    <hr class="bs-divider">
    <button class="bs-btn" onclick="setFilter('favorites',this)">
      <span class="bs-left">❤️ Favorites</span>
      <span class="fav-badge" id="favBadge">0</span>
    </button>
  </aside>

  <!-- MAIN -->
  <div class="browse-main">
    <div class="browse-topbar">
      <div class="search-field">
        <span>🔍</span>
        <input type="text" id="searchBox" placeholder="Search songs, artists, genres…" oninput="onSearch()">
      </div>
      <select class="sort-select" onchange="onSort(this.value)">
        <option value="default">Sort: Default</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="artist">By Artist</option>
        <option value="genre">By Genre</option>
      </select>
    </div>
    <div class="results-label" id="resultsLabel"></div>
    <div class="s-grid" id="songGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const PER_PAGE = 24;
let filterCat = 'all';
let searchQ = '';
let sortMode = 'default';
let page = 1;
let activeSidebarBtn = null;

function getFiltered() {
  let songs = SONGS.map((s, i) => ({ ...s, _idx: i }));
  if (filterCat === 'favorites') songs = songs.filter(s => favorites.has(s._idx));
  else if (filterCat !== 'all') songs = songs.filter(s => s.genre === filterCat);
  if (searchQ) songs = songs.filter(s =>
    s.title.toLowerCase().includes(searchQ) ||
    s.artist.toLowerCase().includes(searchQ) ||
    s.genre.toLowerCase().includes(searchQ)
  );
  if (sortMode === 'az') songs.sort((a,b) => a.title.localeCompare(b.title));
  else if (sortMode === 'za') songs.sort((a,b) => b.title.localeCompare(a.title));
  else if (sortMode === 'artist') songs.sort((a,b) => a.artist.localeCompare(b.artist));
  else if (sortMode === 'genre') songs.sort((a,b) => a.genre.localeCompare(b.genre));
  return songs;
}

function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (page > totalPages) page = 1;
  const pageSongs = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  document.getElementById('resultsLabel').textContent = `${total} song${total !== 1 ? 's' : ''} found`;
  updateCounts();

  const grid = document.getElementById('songGrid');
  if (!pageSongs.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big">🎵</div><h3>No songs found</h3><p>Try a different search or category</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = pageSongs.map(s => `
    <div class="s-card ${curIdx === s._idx && isPlay ? 'playing' : ''}" id="sc-${s._idx}" onclick="playFromGrid(${s._idx})">
      ${curIdx === s._idx && isPlay ? `<div class="play-bars"><span></span><span></span><span></span></div>` : ''}
      <div class="s-art" style="padding:0">
        <img src="${s.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" />
        <div class="s-overlay">
          <button class="s-play-btn">${curIdx === s._idx && isPlay ? '⏸' : '▶'}</button>
        </div>
      </div>
      <div class="s-title">${s.title}</div>
      <div class="s-artist">${s.artist}</div>
      <div class="s-foot">
        <span class="s-genre-tag">${s.genre}</span>
        <div class="s-actions">
          <button class="s-act-btn ${favorites.has(s._idx) ? 'fav-on' : ''}" onclick="event.stopPropagation();favToggle(${s._idx})" title="Favorite">❤</button>
          <button class="s-act-btn" onclick="event.stopPropagation();downloadSong(${s._idx})" title="Download">⬇</button>
        </div>
      </div>
    </div>
  `).join('');

  // PAGINATION
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="pg-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - page) <= 2)
      html += `<button class="pg-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i - page) === 3) html += `<span style="color:var(--muted);padding:8px 4px">…</span>`;
  }
  html += `<button class="pg-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(p) { page = p; render(); window.scrollTo(0, 0); }
function setFilter(cat, btn) {
  filterCat = cat; page = 1;
  document.querySelectorAll('.bs-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function onSearch() { searchQ = document.getElementById('searchBox').value.toLowerCase().trim(); page = 1; render(); }
function onSort(v) { sortMode = v; page = 1; render(); }
function playFromGrid(idx) { curIdx = idx; playSong(idx); setTimeout(render, 50); }
function favToggle(idx) { toggleFav(idx); render(); document.getElementById('favBadge').textContent = favorites.size; }
function updateCounts() {
  const cats = ['Electronic','Rock','Jazz','Classical','Hip-Hop','Ambient','Folk','Pop','Instrumental'];
  cats.forEach(c => {
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = SONGS.filter(s => s.genre === c).length;
  });
  document.getElementById('cnt-all').textContent = SONGS.length;
  document.getElementById('favBadge').textContent = favorites.size;
}
function highlightActive() { render(); }

// Init
function initBrowse() {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');
  if (cat) {
    filterCat = cat;
    setTimeout(() => {
      const btns = document.querySelectorAll('.bs-btn');
      btns.forEach(b => {
        b.classList.remove('active');
        if (b.textContent.trim().includes(cat)) b.classList.add('active');
      });
    }, 100);
  }
  render();
}
window.addEventListener('DOMContentLoaded', () => {
  if (window.isSongsLoaded) initBrowse();
  else window.addEventListener('songsLoaded', initBrowse);
});
</script>
</body>
</html>
